name: Build MalikLang Studio

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify source file exists
        run: |
          if (!(Test-Path "MalikLangStudio.cpp")) {
            Write-Error "MalikLangStudio.cpp not found in repository root!"
            exit 1
          }
          Write-Host "Found MalikLangStudio.cpp - proceeding to compile"

      - name: Compile MalikLang Studio (Logic + UI)
        run: |
          cl.exe /EHsc /std:c++17 /O2 MalikLangStudio.cpp /Fe:MalikLangStudio.exe user32.lib gdi32.lib comctl32.lib comdlg32.lib /link /SUBSYSTEM:WINDOWS

      - name: Verify build output
        run: |
          if (!(Test-Path "MalikLangStudio.exe")) {
            Write-Error "Build failed - MalikLangStudio.exe was not created!"
            exit 1
          }
          Write-Host "Build succeeded - MalikLangStudio.exe created"

      - name: Upload Software Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MalikLangStudio-App
          path: MalikLangStudio.exe
